name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref so a quick push series does not pile up
# parallel jobs on the same matrix.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Runtime probes newer than the Linux 6.12 baseline stay out of the required
# lane until GitHub-hosted ubuntu-latest reliably exposes a newer io_uring
# baseline. Zero-copy runtime probes require network or NIC support the hosted
# runner does not provide, so CI does not run them. Keep these patterns anchored
# to whole test names so helper, encoding, and pure example coverage still runs.
env:
  URING_OPTIONAL_KERNEL_TESTS: '^Test(IntegrationMultishotAcceptPrimeWaitSurfacesImmediateError|IntegrationMultishotAccept|UringEpollWait|UringPipe|ResizeRings|QueryOpcodes|NAPIRegistration|SQE128NopCycle|PollUpdate|NewZCRXReceiverNotSupported)$'
  URING_CI_UNSUPPORTED_ZC_TESTS: '^Test(IntegrationZeroCopySend|ZCTrackerBasic|ZCTrackerPoolExhaustion|ZCTrackerHandlerOrder|ZCTrackerExactlyOnce|ZCTrackerGCSafety|SendZeroCopyFixed|ZeroCopyNotificationFlags|SendZeroCopyFixedMultiTarget|ZeroCopyBufferSafety|ZeroCopyLargeBuffer|ZeroCopyMultipleBuffers|ZeroCopyErrorHandling|ZeroCopySequentialSends|TwoCQEOverhead|ZeroCopyVsNormalComparison|MultiDestinationComparison)$'
  URING_OPTIONAL_RUNTIME_EXAMPLES: '^Test(BufferRingBasics|SQEContextIndirect|SQEContextExtended|CQEViewAccess|TCPEchoServer|UringSocketWithSyscallAccept|SimpleTCPAccept|BroadcastServerWithFramer|UDPPingPong|FileWriteRead|BatchedFileOps|NopThroughput|FixedBufferBasics|WriteFixedOperation|ReadFixedOperation|MultishotHandlerControl|PollAddBasic|PollCancelByFD|PollMultipleFDs|SpliceBasics|TeeOperation|BasicTimeout|MultipleTimeouts|PollWithTimeout|LinkedTimeout|VectoredWrite|VectoredRead)$'
  URING_CI_UNSUPPORTED_ZC_EXAMPLES: '^Test(ZCTrackerBasic|MulticastZeroCopy)$'

jobs:
  lint-build-test-linux:
    name: Lint, Build & Test (Linux/amd64, Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        go-version: [ '1.26.x', 'stable' ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Check formatting
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "Files need formatting:"
            echo "$output"
            exit 1
          fi

      - name: Vet
        run: |
          go vet ./... 2>&1 | tee /tmp/vet.out || true
          if [ -s /tmp/vet.out ]; then
            # Drop package headers, module-download chatter, and the intentional
            # `unsafe.Pointer` arithmetic warning over kernel-mapped ring memory.
            grep -v -E "(^#|^go: downloading |possible misuse of unsafe.Pointer)" /tmp/vet.out > /tmp/vet.filtered || true
            if [ -s /tmp/vet.filtered ]; then
              cat /tmp/vet.filtered
              exit 1
            fi
          fi

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: go build ./...

      - name: Show runner kernel
        run: uname -a

      # Required root-package lane. Covers io_uring behavior available on Linux
      # 6.12 and earlier; newer runtime probes run in the non-blocking lane
      # below. Keep this lane focused on kernel-feature correctness; race
      # instrumentation is intentionally left to the non-blocking full-suite
      # lane because it can perturb hosted-runner io_uring resource behavior.
      # Print the failure digest to both the job log and the summary so the
      # failing test remains visible when the verbose log is too long.
      - name: Test root package (Linux <=6.12 io_uring baseline)
        run: |
          set -o pipefail
          log=/tmp/uring-root-test.out
          set +e
          go test -v -count=1 -timeout=180s -skip "$URING_OPTIONAL_KERNEL_TESTS|$URING_CI_UNSUPPORTED_ZC_TESTS" . 2>&1 | tee "$log"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            summary=/tmp/uring-root-test-summary.md
            {
              echo "### Root package test failures"
              echo
              echo '```text'
              grep -E '^(--- FAIL:|    [^[:space:]]+_test\.go:[0-9]+:|    testing\.go:[0-9]+:|WARNING: DATA RACE|Found [0-9]+ data race|ThreadSanitizer|panic:|fatal error:|FAIL[[:space:]]|FAIL$)' "$log" | tail -n 120 || true
              echo '```'
            } | tee "$summary"
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi

      - name: Collect root package coverage
        if: matrix.go-version == 'stable'
        run: |
          set -o pipefail
          log=/tmp/uring-coverage-test.out
          set +e
          go test -v -covermode=count -coverprofile=coverage.out -count=1 -timeout=180s -skip "$URING_OPTIONAL_KERNEL_TESTS|$URING_CI_UNSUPPORTED_ZC_TESTS" . 2>&1 | tee "$log"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            summary=/tmp/uring-coverage-test-summary.md
            {
              echo "### Coverage test failures"
              echo
              echo '```text'
              grep -E '^(--- FAIL:|    [^[:space:]]+_test\.go:[0-9]+:|    testing\.go:[0-9]+:|WARNING: DATA RACE|Found [0-9]+ data race|ThreadSanitizer|panic:|fatal error:|FAIL[[:space:]]|FAIL$)' "$log" | tail -n 120 || true
              echo '```'
            } | tee "$summary"
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi

      - name: Upload coverage to Codecov
        if: matrix.go-version == 'stable'
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: ./coverage.out
          disable_search: true
          flags: linux-amd64-root
          name: linux-amd64-root
          fail_ci_if_error: false

      - name: Report public API performance metrics
        if: matrix.go-version == 'stable'
        run: |
          set -o pipefail
          benchmark_pattern='^BenchmarkPublicPerformance(SQEContextPackDirect|CQEViewAccessors|DirectCQEAccessors|CompletionError|SocketIORoundTrip|StorageIOWriteRead)$'
          set +e
          go test -run '^$' -bench "$benchmark_pattern" -benchmem -benchtime=100ms -count=3 -timeout=120s . | tee /tmp/uring-public-performance.txt
          status=${PIPESTATUS[0]}
          set -e
          required_benchmarks=(
            BenchmarkPublicPerformanceSQEContextPackDirect
            BenchmarkPublicPerformanceCQEViewAccessors
            BenchmarkPublicPerformanceDirectCQEAccessors
            BenchmarkPublicPerformanceCompletionError
            BenchmarkPublicPerformanceSocketIORoundTrip/512B
            BenchmarkPublicPerformanceSocketIORoundTrip/4KiB
            BenchmarkPublicPerformanceSocketIORoundTrip/16KiB
            BenchmarkPublicPerformanceStorageIOWriteRead/512B
            BenchmarkPublicPerformanceStorageIOWriteRead/4KiB
            BenchmarkPublicPerformanceStorageIOWriteRead/64KiB
          )
          {
            echo "### Public API performance metrics"
            echo
            echo "Public API, socket I/O, and storage I/O measurements from the GitHub-hosted runner."
            echo "Zero-copy socket I/O benchmarks require a suitable real-host network setup, so hosted CI leaves them for dedicated Linux validation."
            echo
            echo "- Go: $(go version)"
            echo "- Runner: $(uname -s)/$(uname -m) $(uname -r)"
            echo
            if [ "$status" -ne 0 ]; then
              echo "> Benchmark collection exited with status $status. The rows below are the measurements produced before the hosted runner stopped the benchmark command."
              echo
            fi
            missing=0
            for benchmark in "${required_benchmarks[@]}"; do
              if ! grep -q "^${benchmark}" /tmp/uring-public-performance.txt; then
                echo "- Missing benchmark row: \`${benchmark}\`"
                missing=1
              fi
            done
            if [ "$missing" -ne 0 ]; then
              echo
            fi
            echo "| Benchmark | samples | avg ns/op | avg B/op | avg allocs/op |"
            echo "|---|---:|---:|---:|---:|"
            awk '
              /^BenchmarkPublicPerformance/ {
                name=$1
                sub(/-[0-9]+$/, "", name)
                if (!(name in seen)) {
                  order[++orderLen] = name
                  seen[name] = 1
                }
                ns = bytes = allocs = ""
                for (i = 2; i <= NF; i++) {
                  if ($(i + 1) == "ns/op") ns = $i
                  if ($(i + 1) == "B/op") bytes = $i
                  if ($(i + 1) == "allocs/op") allocs = $i
                }
                samples[name]++
                nsTotal[name] += ns
                bytesTotal[name] += bytes
                allocsTotal[name] += allocs
              }
              END {
                for (i = 1; i <= orderLen; i++) {
                  name = order[i]
                  printf "| `%s` | %d | %.2f | %.2f | %.2f |\n",
                    name, samples[name],
                    nsTotal[name] / samples[name],
                    bytesTotal[name] / samples[name],
                    allocsTotal[name] / samples[name]
                }
              }
            ' /tmp/uring-public-performance.txt
            echo
            echo "<details><summary>Raw benchmark output</summary>"
            echo
            printf '%s\n' '```text'
            cat /tmp/uring-public-performance.txt
            printf '%s\n' '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      # Required examples lane. Runs examples that are pure documentation or
      # encoding checks; runtime examples stay visible in the non-blocking lane
      # below until the runner baseline catches up.
      - name: Test examples (pure required subset)
        run: go test -v -count=1 -timeout=180s -skip "$URING_OPTIONAL_RUNTIME_EXAMPLES|$URING_CI_UNSUPPORTED_ZC_EXAMPLES" ./examples

      # Non-blocking lane. Keeps newer kernel probes visible on ubuntu-latest.
      # Zero-copy runtime probes stay out of hosted CI and should be validated
      # on a dedicated Linux setup instead.
      - name: Test (newer io_uring features, non-blocking)
        continue-on-error: true
        run: go test -race -count=1 -timeout=180s -skip "$URING_CI_UNSUPPORTED_ZC_TESTS|$URING_CI_UNSUPPORTED_ZC_EXAMPLES" ./...

  vet-build-darwin:
    name: Vet & Build (Darwin/arm64, Go ${{ matrix.go-version }})
    runs-on: macos-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        go-version: [ '1.26.x', 'stable' ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Vet
        run: |
          go vet ./... 2>&1 | tee /tmp/vet.out || true
          if [ -s /tmp/vet.out ]; then
            grep -v -E "(^#|^go: downloading |possible misuse of unsafe.Pointer)" /tmp/vet.out > /tmp/vet.filtered || true
            if [ -s /tmp/vet.filtered ]; then
              cat /tmp/vet.filtered
              exit 1
            fi
          fi

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: go build ./...

  cross-build:
    name: Cross-Build (${{ matrix.target.goos }}/${{ matrix.target.goarch }}, Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        go-version: [ '1.26.x', 'stable' ]
        target:
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: '0'
        run: go build -v ./...
