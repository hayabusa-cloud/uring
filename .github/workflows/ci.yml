name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI (Go ${{ matrix.go-version }}, ${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        go-version: ['1.26', 'stable']
        include:
          ## Waiting for the Ubuntu 26.04 runner to be available in GitHub Actions
          - goos: linux
            goarch: amd64
            runs_on: ubuntu-latest
            run_tests: false
          - goos: linux
            goarch: arm64
            runs_on: ubuntu-latest
            run_tests: false
          - goos: linux
            goarch: riscv64
            runs_on: ubuntu-latest
            run_tests: false
          - goos: linux
            goarch: loong64
            runs_on: ubuntu-latest
            run_tests: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check formatting
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "Files need formatting:"
            echo "$output"
            exit 1
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build ./...

      - name: Test
        if: matrix.run_tests
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go test ./...
